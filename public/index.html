<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    color: #222;
    text-align: center;
  }
  canvas {
    background: #111;
    border-radius: 6px;
    image-rendering: pixelated;
    touch-action: none;
  }
  #score { font-size: 18px; margin: 10px 0; }
  #msg { color: #888; font-size: 14px; min-height: 20px; }
  button { padding: 6px 14px; font-size: 13px; }
</style>
</head>
<body>
  <h1>Snake</h1>
  <div id="score">Score: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="msg">Use arrow keys / WASD to move. Press space to start.</div>
  <p>
    <button id="locBtn">Give feedback</button>
    <span id="locStatus"></span>
  </p>
  <div id="feedbackForm" style="display:none; margin-top:10px;">
    <textarea id="feedbackText" rows="3" cols="40" placeholder="Your feedback..."></textarea><br>
    <button id="feedbackSubmit">Submit</button>
    <span id="feedbackStatus"></span>
  </div>
  <script src="/collector.js"></script>
  <script>
    (function () {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const msgEl = document.getElementById('msg');

      const GRID = 20;
      const CELLS = canvas.width / GRID;

      let snake, dir, nextDir, food, score, running, loopId;

      function reset() {
        snake = [{ x: 8, y: 10 }, { x: 7, y: 10 }, { x: 6, y: 10 }];
        dir = { x: 1, y: 0 };
        nextDir = dir;
        score = 0;
        running = false;
        placeFood();
        draw();
        scoreEl.textContent = 'Score: 0';
        msgEl.textContent = 'Use arrow keys / WASD to move. Press space to start.';
      }

      function placeFood() {
        do {
          food = {
            x: Math.floor(Math.random() * CELLS),
            y: Math.floor(Math.random() * CELLS),
          };
        } while (snake.some((s) => s.x === food.x && s.y === food.y));
      }

      function draw() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#e63946';
        ctx.fillRect(food.x * GRID + 1, food.y * GRID + 1, GRID - 2, GRID - 2);

        snake.forEach((seg, i) => {
          ctx.fillStyle = i === 0 ? '#4ade80' : '#22c55e';
          ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
        });
      }

      function tick() {
        dir = nextDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        if (
          head.x < 0 || head.x >= CELLS ||
          head.y < 0 || head.y >= CELLS ||
          snake.some((s) => s.x === head.x && s.y === head.y)
        ) {
          gameOver();
          return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreEl.textContent = 'Score: ' + score;
          placeFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function gameOver() {
        running = false;
        clearInterval(loopId);
        msgEl.textContent = 'Game over — final score ' + score + '. Press space to restart.';
      }

      function start() {
        if (running) return;
        reset();
        running = true;
        msgEl.textContent = '';
        loopId = setInterval(tick, 180);
      }

      document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === ' ') {
          e.preventDefault();
          if (!running) start();
          return;
        }
        const map = {
          arrowup: { x: 0, y: -1 }, w: { x: 0, y: -1 },
          arrowdown: { x: 0, y: 1 }, s: { x: 0, y: 1 },
          arrowleft: { x: -1, y: 0 }, a: { x: -1, y: 0 },
          arrowright: { x: 1, y: 0 }, d: { x: 1, y: 0 },
        };
        const next = map[key];
        if (!next) return;
        e.preventDefault();
        if (next.x === -dir.x && next.y === -dir.y) return; // no 180 turns
        nextDir = next;
      });

      reset();
    })();
  </script>
</body>
</html>
